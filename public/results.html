<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Headshots — HeadshotAI Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#050505;--card:#0a0a0a;--elevated:#111;--border:#1a1a1a;--text:#fafafa;--muted:#888;--dim:#555;--accent:#6366f1;--green:#22c55e;--radius:16px; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
    .container{max-width:1100px;margin:0 auto;padding:48px 24px;}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:16px;}
    h1{font-size:1.8rem;font-weight:800;}
    .header-actions{display:flex;gap:12px;}
    .btn{padding:12px 24px;border-radius:10px;font-family:inherit;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;}
    .btn-primary:hover{opacity:0.9;}
    .btn-secondary{background:var(--elevated);color:var(--text);border:1px solid var(--border);}
    .btn-secondary:hover{border-color:#333;}
    .status-msg{text-align:center;padding:60px 0;color:var(--muted);font-size:1.1rem;}
    .status-msg .spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
    .filter-btn{padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.08);}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
    .photo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;cursor:pointer;position:relative;}
    .photo-card:hover{border-color:#333;transform:translateY(-2px);}
    .photo-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
    .photo-meta{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
    .photo-category{font-size:0.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
    .photo-dl{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--elevated);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.85rem;transition:all 0.2s;text-decoration:none;color:var(--text);}
    .photo-dl:hover{background:var(--accent);border-color:var(--accent);}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);}
    .lightbox.active{display:flex;}
    .lightbox img{max-width:90%;max-height:85vh;border-radius:12px;}
    .lightbox-close{position:fixed;top:20px;right:24px;color:#fff;font-size:2rem;cursor:pointer;z-index:101;}
    .count{font-size:0.9rem;color:var(--dim);}
    @media(max-width:768px){.gallery{grid-template-columns:repeat(2,1fr);gap:10px;}.header{flex-direction:column;align-items:flex-start;}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>✨ Your Headshots</h1>
        <div class="count" id="count"></div>
      </div>
      <div class="header-actions">
        <a class="btn btn-primary" id="downloadAll" href="#">⬇️ Download All (ZIP)</a>
        <a class="btn btn-secondary" href="/">← Back</a>
      </div>
    </div>

    <div class="filters" id="filters"></div>
    <div id="content"><div class="status-msg"><div class="spinner"></div><br>Loading your headshots...</div></div>
    <div class="gallery" id="gallery" style="display:none;"></div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="">
  </div>

  <script>
    const orderId = window.location.pathname.split('/').pop();
    let allResults = [];
    let activeFilter = 'all';

    async function load() {
      try {
        const res = await fetch(`/api/order/${orderId}`);
        const data = await res.json();

        if (data.status === 'generating') {
          document.getElementById('content').innerHTML = '<div class="status-msg"><div class="spinner"></div><br>Your headshots are being generated...<br><span style="font-size:0.85rem;">This usually takes 3-8 minutes. This page auto-refreshes.</span></div>';
          setTimeout(load, 4000);
          return;
        }

        if (data.status === 'error') {
          document.getElementById('content').innerHTML = `<div class="status-msg">❌ Something went wrong: ${data.error}<br><br><a href="/" class="btn btn-secondary">Try Again</a></div>`;
          return;
        }

        if (data.status !== 'completed' || !data.results || data.results.length === 0) {
          document.getElementById('content').innerHTML = '<div class="status-msg">No headshots found for this order.<br><br><a href="/" class="btn btn-secondary">Go Back</a></div>';
          return;
        }

        allResults = data.results;
        document.getElementById('content').style.display = 'none';
        document.getElementById('gallery').style.display = 'grid';
        document.getElementById('count').textContent = `${allResults.length} headshots · ${data.package}`;
        document.getElementById('downloadAll').href = `/api/download-all/${orderId}`;

        // Build filters
        const categories = [...new Set(allResults.map(r => r.category))];
        const filtersHtml = `<button class="filter-btn active" onclick="setFilter('all')">All</button>` + 
          categories.map(c => `<button class="filter-btn" onclick="setFilter('${c}')">${c}</button>`).join('');
        document.getElementById('filters').innerHTML = filtersHtml;

        renderGallery();
      } catch(e) {
        document.getElementById('content').innerHTML = '<div class="status-msg">Error loading results. Please refresh.</div>';
      }
    }

    function setFilter(cat) {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderGallery();
    }

    function renderGallery() {
      const filtered = activeFilter === 'all' ? allResults : allResults.filter(r => r.category === activeFilter);
      document.getElementById('gallery').innerHTML = filtered.map(r => `
        <div class="photo-card" onclick="openLightbox('${r.url}')">
          <img src="${r.url}" alt="${r.category} headshot" loading="lazy">
          <div class="photo-meta">
            <span class="photo-category">${r.category}</span>
            <a class="photo-dl" href="${r.url}" download title="Download" onclick="event.stopPropagation()">⬇</a>
          </div>
        </div>
      `).join('');
    }

    function openLightbox(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    load();
  </script>
</body>
</html>
